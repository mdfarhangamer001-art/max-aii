name: MAX AI Single EXE Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build MAX AI Installer
        run: npm run build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MAX AI v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: |
            dist/*Setup*.exe

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
