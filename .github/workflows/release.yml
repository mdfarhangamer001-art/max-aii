name: 🚀 Auto Build & Release MAX-AII

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint || true

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # विंडोज के लिए बिल्कुल सही और सुरक्षित क्लीन इंस्टॉल तरीका
      - name: Clean install dependencies
        run: |
          npm ci --legacy-peer-deps
        # npm ci अपने आप पुराने node_modules को हटाकर फ्रेश इंस्टॉल करता है, 
        # जिससे विंडोज पर rm -rf की जरूरत ही नहीं पड़ेगी।

      - name: Rebuild Native Modules
        run: npm rebuild
        continue-on-error: true

      - name: Build Application
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/
          
