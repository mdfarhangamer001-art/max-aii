# In your local repo:
cd max-aii

# Checkout the feature branch
git checkout feature/tier-1-core-foundation
git pull origin feature/tier-1-core-foundation

# Create workflow directory
mkdir -p .github/workflows

# Create the file
cat > .github/workflows/build-release.yml << 'EOF'
name: 🚀 Auto Build & Release MAX-AII

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint || true

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/
EOF

# Commit and push
git add .github/workflows/build-release.yml
git commit -m "ci: add build-release workflow"
git push origin feature/tier-1-core-foundation
