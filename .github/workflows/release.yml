name: 🚀 Auto Build & Release MAX-AII

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: npm run lint || true

  create-tag:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

  build-windows:
    needs: create-tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Rebuild Native Modules
        run: npm rebuild
        continue-on-error: true

      - name: Build Application (.exe Creation)
        # यहाँ हमने 'npm run build' को बदलकर सही इलेक्ट्रॉन बिल्ड कमांड कर दिया है
        run: npm run electron:build

      - name: Analyze Release Folder Content
        shell: powershell
        run: |
          echo "--- Checking release folder content ---"
          if (Test-Path release) {
              Get-ChildItem -Path release -Recurse
          } else {
              echo "Release folder not found!"
          }

      # यहाँ हम dist/ के बजाय release/ फ़ोल्डर को आर्टिफ़ैक्ट के रूप में अपलोड कर रहे हैं
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/

  release:
    needs: [create-tag, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-artifacts

      - name: Create and Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.new_tag }}
          name: Release ${{ needs.create-tag.outputs.new_tag }}
          body: |
            Automated production build for version ${{ needs.create-tag.outputs.new_tag }}.
            
            **Asset Statistics:**
            * Platform: Windows
            * Format: Standalone `.exe` / Installer
          # release-artifacts फ़ोल्डर में जो भी .exe फाइलें बनेंगी, उन्हें यह उठा लेगा
          files: release-artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

